name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            expected_arch: x86_64
            platform_label: linux-x86_64
          - runner: macos-15
            expected_arch: arm64
            platform_label: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y libgc-dev llvm-21 llvm-21-dev clang-21 libpolly-21-dev
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-21 100

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bdw-gc llvm@21
          brew link --force --overwrite llvm@21
          echo "/opt/homebrew/opt/llvm@21/bin" >> "$GITHUB_PATH"

      - name: Verify LLVM 21
        run: |
          version=$(llvm-config --version)
          echo "LLVM version: $version"
          echo "$version" | grep -qE '^21\.' || { echo "ERROR: expected LLVM 21.x, got $version"; exit 1; }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binary and runtime
        # inkwell requires an explicit LLVM version feature; LLVM 21 is installed above.
        run: cargo build --release -p tyra-cli -p tyra-runtime --no-default-features --features tyra-codegen-llvm/llvm21-1

      - name: Verify binary architecture
        run: |
          arch=$(uname -m)
          echo "Runner arch: $arch"
          file target/release/tyra
          [ "$arch" = "${{ matrix.expected_arch }}" ] || { echo "ERROR: expected ${{ matrix.expected_arch }}, got $arch"; exit 1; }

      - name: Package artifact
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          name="tyra-${version}-${{ matrix.platform_label }}"
          mkdir -p "dist/${name}"
          cp target/release/tyra "dist/${name}/"
          cp target/release/libtyra_runtime.a "dist/${name}/"
          cp -r stdlib "dist/${name}/"
          cp README.md LICENSE CHANGELOG.md PLATFORMS.md "dist/${name}/"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          echo "ARTIFACT_NAME=${name}" >> "$GITHUB_ENV"
          echo "ARTIFACT_PATH=dist/${name}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}

  build-musl-static:
    name: build static (alpine musl x86_64)
    runs-on: ubuntu-latest
    container: alpine:3.21
    env:
      CARGO_HOME: /root/.cargo
      RUSTUP_HOME: /root/.rustup
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Alpine dependencies
        # GNU `tar` is added preemptively: busybox tar (Alpine default) has
        # failed during the `actions/cache` post-job save step on Alpine
        # jobs, likely above a certain cache size. Adding GNU tar avoids the
        # "/bin/tar failed with exit code 1" save warning observed previously.
        run: |
          apk add --no-cache \
            gc-dev \
            clang19 \
            llvm19 \
            llvm19-dev \
            llvm19-static \
            zlib-static \
            zstd-static \
            libxml2-static \
            musl-dev \
            pkgconf \
            file \
            bash \
            curl \
            git \
            tar

      - name: Set up LLVM 19 symlinks
        run: |
          # Locate llvm-config wherever Alpine installed it (path varies by Alpine version)
          LLVM_CONFIG=$(find /usr -name 'llvm-config' -o -name 'llvm-config-19' 2>/dev/null | head -1)
          if [ -z "$LLVM_CONFIG" ]; then
            echo "ERROR: llvm-config not found"; find /usr -name 'llvm*' 2>/dev/null | sort; exit 1
          fi
          echo "Found llvm-config at: $LLVM_CONFIG"
          ln -sf "$LLVM_CONFIG" /usr/local/bin/llvm-config
          ln -sf /usr/bin/clang-19 /usr/local/bin/clang
          llvm-config --version
          clang --version

      - name: Install Rust via rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          [ -f "$CARGO_HOME/env" ] && . "$CARGO_HOME/env"
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
            target
          key: alpine-musl-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            alpine-musl-cargo-release-

      - name: Build release binary and runtime
        # inkwell requires an explicit LLVM version feature; LLVM 19 is installed above.
        run: cargo build --release -p tyra-cli -p tyra-runtime --no-default-features --features tyra-codegen-llvm/llvm19-1

      - name: Verify static binary
        run: |
          TYRA_STDLIB=$PWD/stdlib ./target/release/tyra build --static examples/01-hello.tyra -o /tmp/tyra_static_verify
          file /tmp/tyra_static_verify | grep -q "statically linked" || {
            echo "FAIL: binary is not statically linked"
            file /tmp/tyra_static_verify
            exit 1
          }

      - name: Package artifact
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          name="tyra-${version}-linux-musl-x86_64-static"
          mkdir -p "dist/${name}/examples"
          cp target/release/tyra "dist/${name}/"
          cp target/release/libtyra_runtime.a "dist/${name}/"
          cp -r stdlib "dist/${name}/"
          cp README.md LICENSE CHANGELOG.md PLATFORMS.md "dist/${name}/"
          # Include the verified static hello binary so users can immediately
          # confirm static linking works without building anything themselves.
          cp /tmp/tyra_static_verify "dist/${name}/examples/hello"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          echo "ARTIFACT_NAME=${name}" >> "$GITHUB_ENV"
          echo "ARTIFACT_PATH=dist/${name}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}

  publish:
    name: Publish GitHub Release
    needs: [build, build-musl-static]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract release notes from CHANGELOG
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          awk "/^## \[${version}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/**/*.tar.gz
          fail_on_unmatched_files: true
