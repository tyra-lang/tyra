name: Static Corpus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  corpus:
    name: tyra check + test (static corpus)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libgc-dev and LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update
          sudo apt-get install -y libgc-dev llvm-22 clang-22
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-22 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-22 100

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-corpus-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-corpus-

      - name: Build tyra-cli and runtime
        # prefer-dynamic avoids requiring libPolly.a (not in the apt llvm-22 package).
        run: cargo build -p tyra-cli -p tyra-runtime --no-default-features --features tyra-codegen-llvm/llvm22-1-prefer-dynamic

      - name: Run static corpus check (tyra check + tyra test)
        run: bash bench/static-corpus/check.sh ./target/debug/tyra
