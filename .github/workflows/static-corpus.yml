name: Static Corpus

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  corpus:
    name: tyra check (static corpus)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libgc-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc-dev

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-corpus-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-corpus-

      - name: Build tyra-cli and runtime
        run: cargo build -p tyra-cli -p tyra-runtime

      - name: Run static corpus check
        run: bash bench/static-corpus/check.sh ./target/debug/tyra
