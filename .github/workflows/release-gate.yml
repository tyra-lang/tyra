name: Release Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  msrv:
    name: MSRV check (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Install libgc-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y libgc-dev

      - name: Check workspace at MSRV
        run: cargo check --workspace

  release-gate:
    name: build + test + corpus + smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y libgc-dev llvm-21 clang-21
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-21 100

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-gate-

      - name: Build release binary and runtime
        run: cargo build --release -p tyra-cli -p tyra-runtime

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Run static corpus check
        env:
          TYRA_STDLIB: ${{ github.workspace }}/stdlib
        run: bash bench/static-corpus/check.sh ./target/release/tyra

      - name: Verify LLVM 21
        run: |
          version=$(llvm-config --version)
          echo "LLVM version: $version"
          echo "$version" | grep -qE '^21\.' || { echo "ERROR: expected LLVM 21.x, got $version"; exit 1; }

      - name: Smoke test (hello world)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra run examples/01-hello.tyra)
          expected="hello, tyra"
          if [ "$output" != "$expected" ]; then
            echo "FAIL: expected '$expected', got '$output'"
            exit 1
          fi

      - name: Smoke test (tyra test / per-test isolation)
        run: |
          # Verify per-test isolation: a crashing test must not suppress sibling results.
          # isolation_smoke_test.tyra has one test that stack-overflows (non-tail recursion,
          # TCO-proof) and one that passes. Without isolation the crash kills the shared binary
          # and suppresses the sibling's TAP line.
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/static-corpus/isolation_smoke_test.tyra 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qE '^ok [0-9]+ - test_will_pass' || {
            echo "FAIL: passing sibling test was not reported — isolation broken"
            exit 1
          }
          echo "$output" | grep -qE '^not ok [0-9]+ - test_will_crash' || {
            echo "FAIL: crashing test was not reported"
            exit 1
          }

  release-gate-macos:
    name: build + test + corpus + smoke (macos-14 arm64)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        run: |
          brew install bdw-gc llvm@21
          echo "/opt/homebrew/opt/llvm@21/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-gate-

      - name: Build release binary and runtime
        run: cargo build --release -p tyra-cli -p tyra-runtime

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Run static corpus check
        env:
          TYRA_STDLIB: ${{ github.workspace }}/stdlib
        run: bash bench/static-corpus/check.sh ./target/release/tyra

      - name: Verify LLVM 21
        run: |
          version=$(llvm-config --version)
          echo "LLVM version: $version"
          echo "$version" | grep -qE '^21\.' || { echo "ERROR: expected LLVM 21.x, got $version"; exit 1; }

      - name: Smoke test (hello world)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra run examples/01-hello.tyra)
          expected="hello, tyra"
          if [ "$output" != "$expected" ]; then
            echo "FAIL: expected '$expected', got '$output'"
            exit 1
          fi

      - name: Smoke test (tyra test / per-test isolation)
        run: |
          # Verify per-test isolation: a crashing test must not suppress sibling results.
          # isolation_smoke_test.tyra has one test that stack-overflows (non-tail recursion,
          # TCO-proof) and one that passes. Without isolation the crash kills the shared binary
          # and suppresses the sibling's TAP line.
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/static-corpus/isolation_smoke_test.tyra 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qE '^ok [0-9]+ - test_will_pass' || {
            echo "FAIL: passing sibling test was not reported — isolation broken"
            exit 1
          }
          echo "$output" | grep -qE '^not ok [0-9]+ - test_will_crash' || {
            echo "FAIL: crashing test was not reported"
            exit 1
          }

  release-gate-alpine:
    name: build + test + corpus + smoke (alpine musl)
    runs-on: ubuntu-latest
    container: alpine:3.21
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Alpine dependencies
        run: |
          apk add --no-cache \
            gc-dev \
            clang19 \
            llvm19 \
            musl-dev \
            pkgconf \
            bash \
            curl \
            git

      - name: Set up LLVM 19 symlinks
        run: |
          # Ensure llvm-config and clang resolve to versioned binaries on PATH
          ln -sf /usr/bin/llvm-config-19 /usr/local/bin/llvm-config
          ln -sf /usr/bin/clang-19 /usr/local/bin/clang
          llvm-config --version
          clang --version

      - name: Install Rust via rustup
        run: |
          # Alpine apk ships an older Rust; use rustup to guarantee >= MSRV 1.88
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          [ -f "$HOME/.cargo/env" ] && . "$HOME/.cargo/env"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: alpine-musl-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            alpine-musl-cargo-release-gate-

      - name: Build release binary and runtime
        run: cargo build --release -p tyra-cli -p tyra-runtime

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Run static corpus check
        env:
          TYRA_STDLIB: ${{ github.workspace }}/stdlib
        run: bash bench/static-corpus/check.sh ./target/release/tyra

      - name: Smoke test (hello world)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra run examples/01-hello.tyra)
          expected="hello, tyra"
          if [ "$output" != "$expected" ]; then
            echo "FAIL: expected '$expected', got '$output'"
            exit 1
          fi

      - name: Smoke test (static binary)
        run: |
          TYRA_STDLIB=$PWD/stdlib ./target/release/tyra build --static examples/01-hello.tyra -o /tmp/tyra_static_test
          file /tmp/tyra_static_test | grep -q "statically linked" || {
            echo "FAIL: binary is not statically linked"
            file /tmp/tyra_static_test
            exit 1
          }
          output=$(/tmp/tyra_static_test)
          expected="hello, tyra"
          if [ "$output" != "$expected" ]; then
            echo "FAIL: expected '$expected', got '$output'"
            exit 1
          fi

      - name: Smoke test (tyra test / per-test isolation)
        run: |
          # Verify per-test isolation: a crashing test must not suppress sibling results.
          # isolation_smoke_test.tyra has one test that stack-overflows (non-tail recursion,
          # TCO-proof) and one that passes. Without isolation the crash kills the shared binary
          # and suppresses the sibling's TAP line.
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/static-corpus/isolation_smoke_test.tyra 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qE '^ok [0-9]+ - test_will_pass' || {
            echo "FAIL: passing sibling test was not reported — isolation broken"
            exit 1
          }
          echo "$output" | grep -qE '^not ok [0-9]+ - test_will_crash' || {
            echo "FAIL: crashing test was not reported"
            exit 1
          }

  release-gate-macos-x86_64:
    name: build only (macos-13 x86_64 tracking)
    runs-on: macos-13
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        run: |
          brew install bdw-gc llvm@21
          echo "/usr/local/opt/llvm@21/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-x86_64-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-x86_64-cargo-release-gate-

      - name: Build workspace (tracking only)
        run: cargo build --workspace

  release-gate-windows:
    name: build only (windows tracking)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-gate-

      - name: Build workspace (tracking only)
        run: cargo build --workspace
