  release-gate-alpine:
    name: build + test + corpus + smoke (alpine musl)
    runs-on: ubuntu-latest
    container: alpine:3.21
    env:
      CARGO_HOME: /root/.cargo
      RUSTUP_HOME: /root/.rustup
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Alpine dependencies
        # GNU `tar` is added preemptively: busybox tar (Alpine default) has
        # failed during the `actions/cache` post-job save step on this job,
        # likely above a certain cache size. Adding GNU tar avoids the
        # "/bin/tar failed with exit code 1" save warning observed previously.
        run: |
          apk add --no-cache \
            gc-dev \
            clang19 \
            llvm19 \
            llvm19-dev \
            musl-dev \
            pkgconf \
            file \
            bash \
            curl \
            git \
            tar

      - name: Set up LLVM 19 symlinks
        run: |
          # Locate llvm-config wherever Alpine installed it (path varies by Alpine version)
          LLVM_CONFIG=$(find /usr -name 'llvm-config' -o -name 'llvm-config-19' 2>/dev/null | head -1)
          if [ -z "$LLVM_CONFIG" ]; then
            echo "ERROR: llvm-config not found"; find /usr -name 'llvm*' 2>/dev/null | sort; exit 1
          fi
          echo "Found llvm-config at: $LLVM_CONFIG"
          ln -sf "$LLVM_CONFIG" /usr/local/bin/llvm-config
          ln -sf /usr/bin/clang-19 /usr/local/bin/clang
          llvm-config --version
          clang --version

      - name: Install Rust via rustup
        run: |
          # Alpine apk ships an older Rust; use rustup to guarantee >= MSRV 1.88
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          [ -f "$CARGO_HOME/env" ] && . "$CARGO_HOME/env"
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
            target
          key: alpine-musl-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            alpine-musl-cargo-release-gate-

      - name: Build release binary and runtime
        # inkwell requires an explicit LLVM version feature; LLVM 19 is installed above.
        run: cargo build --release -p tyra-cli -p tyra-runtime --no-default-features --features tyra-codegen-llvm/llvm19-1-prefer-dynamic

      - name: Run workspace tests (excluding runtime)
        run: cargo test --workspace --exclude tyra-runtime --no-default-features --features tyra-codegen-llvm/llvm19-1-prefer-dynamic

      - name: Run runtime tests (single-threaded, Boehm GC safety)
        # GC_INITIAL_HEAP_SIZE: prevent BDW GC from triggering collection #1 inside
        # Alpine musl containers where pthread_kill-based thread stopping fails
        # ("Signals delivery fails constantly at GC #1"). Smoke tests use <<1 MB of
        # GC heap; 64 MB initial size keeps the heap below the collection threshold.
        env:
          GC_INITIAL_HEAP_SIZE: "64m"
        run: cargo test -p tyra-runtime -- --test-threads=1

      - name: Run static corpus check
        env:
          TYRA_STDLIB: ${{ github.workspace }}/stdlib
        run: bash bench/static-corpus/check.sh ./target/release/tyra

      - name: Smoke test (hello world)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra run examples/01-hello.tyra)
          expected="hello, tyra"
          if [ "$output" != "$expected" ]; then
            echo "FAIL: expected '$expected', got '$output'"
            exit 1
          fi

      - name: Smoke test (static binary)
        run: |
          TYRA_STDLIB=$PWD/stdlib ./target/release/tyra build --static examples/01-hello.tyra -o /tmp/tyra_static_test
          file /tmp/tyra_static_test | grep -q "statically linked" || {
            echo "FAIL: binary is not statically linked"
            file /tmp/tyra_static_test
            exit 1
          }
          output=$(/tmp/tyra_static_test)
          expected="hello, tyra"
          if [ "$output" != "$expected" ]; then
            echo "FAIL: expected '$expected', got '$output'"
            exit 1
          fi

      - name: Smoke test (tyra test / per-test isolation)
        run: |
          # Verify per-test isolation: a crashing test must not suppress sibling results.
          # isolation_smoke_test.tyra has one test that stack-overflows (non-tail recursion,
          # TCO-proof) and one that passes. Without isolation the crash kills the shared binary
          # and suppresses the sibling's TAP line.
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/smoke/isolation_smoke_test.tyra 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qE '^ok [0-9]+ - test_will_pass' || {
            echo "FAIL: passing sibling test was not reported — isolation broken"
            exit 1
          }
          echo "$output" | grep -qE '^not ok [0-9]+ - test_will_crash' || {
            echo "FAIL: crashing test was not reported"
            exit 1
          }

      - name: Smoke test (tyra test --timeout)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test --timeout 2 bench/smoke/timeout_smoke_test.tyra 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qE '^not ok [0-9]+ - test_will_timeout' || {
            echo "FAIL: timed-out test was not reported as failed"
            exit 1
          }
          echo "$output" | grep -qE '^ok [0-9]+ - test_will_pass' || {
            echo "FAIL: passing sibling test was not reported after timeout"
            exit 1
          }

      - name: Smoke test (tyra test --format junit / failure case)
        run: |
          # Verify JUnit failure case: isolation_smoke_test has one crashing test,
          # so the XML must contain a <failure> element (not just <testcase>).
          # Capture with || true so pipefail does not fire on tyra test's non-0 exit.
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test --format junit bench/smoke/isolation_smoke_test.tyra 2>/dev/null || true)
          echo "$output" | grep -q '<failure' || {
            echo "FAIL: JUnit output contains no <failure> element for the crashing test"
            exit 1
          }

      - name: Smoke test (test "name" syntax)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/smoke/test_name_syntax_smoke_test.tyra 2>&1)
          echo "$output"
          echo "$output" | grep -qE '^ok ' || { echo "FAIL: named test syntax smoke tests not passing"; exit 1; }
          echo "$output" | grep -qE '^not ok ' && { echo "FAIL: named test syntax smoke tests have failures"; exit 1; } || true

      - name: Smoke test (test "name" non-ASCII)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/smoke/test_name_non_ascii_smoke_test.tyra 2>&1)
          echo "$output"
          echo "$output" | grep -qE '^ok ' || { echo "FAIL: non-ASCII named test smoke tests not passing"; exit 1; }
          echo "$output" | grep -qE '^not ok ' && { echo "FAIL: non-ASCII named test smoke tests have failures"; exit 1; } || true

      - name: Smoke test (test "name" panics modifier)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/smoke/test_name_panics_block_smoke_test.tyra 2>&1)
          echo "$output"
          ok_count=$(echo "$output" | grep -cE '^ok ' || true)
          [ "$ok_count" -ge 2 ] || { echo "FAIL: expected at least 2 passing named tests, got $ok_count"; exit 1; }
          echo "$output" | grep -qE '^not ok ' && { echo "FAIL: test-name panics smoke tests have failures"; exit 1; } || true

  release-gate-windows:
    name: check LLVM-free crates (windows tracking)
    runs-on: windows-2025-vs2026
    # Tracking-only: Windows full LLVM build requires llvm-sys + LLVM dev files
    # (lib/include), which the official LLVM Windows installer does NOT include.
    # Full Windows distribution build is performed in a separate release-artifact
    # pipeline. This job confirms the LLVM-free crates (compiler front-end +
    # runtime + tooling crates) compile cleanly on Windows MSVC.
    #
    # continue-on-error: true also absorbs transient infrastructure failures
    # (vcpkg cache miss, MSYS2 mirror flakes, network errors during bdwgc build)
    # which would otherwise turn the job red for reasons unrelated to the code.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Initialise MSVC developer environment
        # Sets LIB, INCLUDE, PATH so vcpkg can build native libraries with cl.exe.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install bdwgc via vcpkg
        # Required so that runtime/build.rs can locate gc.lib on Windows.
        # We do NOT install LLVM here — the LLVM Windows installer omits the
        # dev files (lib/include) that llvm-sys 211 requires, so full LLVM build
        # is left to the release-artifact pipeline.
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "00d899c410b31467733472fc3a83a25729046b13"
          runVcpkgInstall: true

      - name: Set LIBGC_PREFIX from vcpkg install
        # run-vcpkg uses --x-install-root with a non-standard UUID path.
        # Dynamically locate gc.lib and export LIBGC_PREFIX so runtime/build.rs
        # can find it via the LIBGC_PREFIX fallback path.
        run: |
          $gclib = Get-ChildItem -Path '${{ github.workspace }}' -Filter 'gc.lib' -Recurse -ErrorAction SilentlyContinue `
            | Where-Object { $_.FullName -match 'x64-windows' } `
            | Select-Object -First 1
          if ($gclib) {
            $prefix = Split-Path $gclib.DirectoryName
            echo "LIBGC_PREFIX=$prefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "LIBGC_PREFIX=$prefix"
          } else {
            Write-Error "gc.lib not found after vcpkg install"
            exit 1
          }

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-gate-

      - name: Check LLVM-free crates (tracking only)
        # tyra-cli, tyra-driver, tyra-lsp all depend on tyra-codegen-llvm (which
        # requires LLVM/inkwell + LLVM dev files not bundled in the official LLVM
        # Windows installer). Check the LLVM-free crates explicitly: compiler
        # front-end, runtime, and tools. This catches Windows-specific compile
        # regressions in the parts of the codebase that can be verified without
        # an LLVM dev environment on the runner.
        # tyra-runtime requires bdwgc (gc.lib via LIBGC_PREFIX, set above).
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: >
          cargo check
          -p tyra-ast
          -p tyra-diagnostics
          -p tyra-lexer
          -p tyra-mir
          -p tyra-parser
          -p tyra-resolve
          -p tyra-types
          -p tyra-runtime
          -p tyra-fmt
          -p tyra-manifest
          -p tyra-new
          -p tyra-pkg
