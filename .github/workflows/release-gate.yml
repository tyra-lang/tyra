name: Release Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  msrv:
    name: MSRV check (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Install libgc-dev and LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y libgc-dev llvm-21 clang-21
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-21 100

      - name: Check workspace at MSRV
        # prefer-dynamic avoids requiring libPolly.a (not in the apt llvm-21 package).
        run: cargo check --workspace --no-default-features --features tyra-codegen-llvm/llvm21-1-prefer-dynamic

  release-gate:
    name: build + test + corpus + smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          . /etc/os-release
          echo "deb http://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y libgc-dev llvm-21 clang-21
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-21 100

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-gate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-gate-

      - name: Build release binary and runtime
        # inkwell requires an explicit LLVM version feature; LLVM 21 is installed above.
        run: cargo build --release -p tyra-cli -p tyra-runtime --no-default-features --features tyra-codegen-llvm/llvm21-1-prefer-dynamic

      - name: Run workspace tests (excluding runtime)
        run: cargo test --workspace --exclude tyra-runtime --no-default-features --features tyra-codegen-llvm/llvm21-1-prefer-dynamic

      - name: Run runtime tests (single-threaded, Boehm GC safety)
        run: cargo test -p tyra-runtime -- --test-threads=1

      - name: Run static corpus check
        env:
          TYRA_STDLIB: ${{ github.workspace }}/stdlib
        run: bash bench/static-corpus/check.sh ./target/release/tyra

      - name: Verify LLVM 21
        run: |
          version=$(llvm-config --version)
          echo "LLVM version: $version"
          echo "$version" | grep -qE '^21\.' || { echo "ERROR: expected LLVM 21.x, got $version"; exit 1; }

      - name: Smoke test (hello world)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra run examples/01-hello.tyra)
          expected="hello, tyra"
          if [ "$output" != "$expected" ]; then
            echo "FAIL: expected '$expected', got '$output'"
            exit 1
          fi

      - name: Smoke test (tyra test / per-test isolation)
        run: |
          # Verify per-test isolation: a crashing test must not suppress sibling results.
          # isolation_smoke_test.tyra has one test that stack-overflows (non-tail recursion,
          # TCO-proof) and one that passes. Without isolation the crash kills the shared binary
          # and suppresses the sibling's TAP line.
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/smoke/isolation_smoke_test.tyra 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qE '^ok [0-9]+ - test_will_pass' || {
            echo "FAIL: passing sibling test was not reported — isolation broken"
            exit 1
          }
          echo "$output" | grep -qE '^not ok [0-9]+ - test_will_crash' || {
            echo "FAIL: crashing test was not reported"
            exit 1
          }

      - name: Smoke test (tyra test --timeout)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test --timeout 2 bench/smoke/timeout_smoke_test.tyra 2>&1 || true)
          echo "$output"
          echo "$output" | grep -qE '^not ok [0-9]+ - test_will_timeout' || {
            echo "FAIL: timed-out test was not reported as failed"
            exit 1
          }
          echo "$output" | grep -qE '^ok [0-9]+ - test_will_pass' || {
            echo "FAIL: passing sibling test was not reported after timeout"
            exit 1
          }

      - name: Smoke test (tyra test --format junit / failure case)
        run: |
          # Verify JUnit failure case: isolation_smoke_test has one crashing test,
          # so the XML must contain a <failure> element (not just <testcase>).
          # Capture with || true so pipefail does not fire on tyra test's non-0 exit.
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test --format junit bench/smoke/isolation_smoke_test.tyra 2>/dev/null || true)
          echo "$output" | grep -q '<failure' || {
            echo "FAIL: JUnit output contains no <failure> element for the crashing test"
            exit 1
          }

      - name: Smoke test (test "name" syntax)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/smoke/test_name_syntax_smoke_test.tyra 2>&1)
          echo "$output"
          echo "$output" | grep -qE '^ok ' || { echo "FAIL: named test syntax smoke tests not passing"; exit 1; }
          echo "$output" | grep -qE '^not ok ' && { echo "FAIL: named test syntax smoke tests have failures"; exit 1; } || true

      - name: Smoke test (test "name" non-ASCII)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/smoke/test_name_non_ascii_smoke_test.tyra 2>&1)
          echo "$output"
          echo "$output" | grep -qE '^ok ' || { echo "FAIL: non-ASCII named test smoke tests not passing"; exit 1; }
          echo "$output" | grep -qE '^not ok ' && { echo "FAIL: non-ASCII named test smoke tests have failures"; exit 1; } || true

      - name: Smoke test (test "name" panics modifier)
        run: |
          output=$(TYRA_STDLIB=$PWD/stdlib ./target/release/tyra test bench/smoke/test_name_panics_block_smoke_test.tyra 2>&1)
          echo "$output"
          ok_count=$(echo "$output" | grep -cE '^ok ' || true)
          [ "$ok_count" -ge 2 ] || { echo "FAIL: expected at least 2 passing named tests, got $ok_count"; exit 1; }
          echo "$output" | grep -qE '^not ok ' && { echo "FAIL: test-name panics smoke tests have failures"; exit 1; } || true

