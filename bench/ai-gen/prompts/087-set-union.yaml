id: "087-set-union"
title: "Set union (unique, sorted)"
description: |
  Read two lines from standard input, each a whitespace-separated
  list of integers (possibly with duplicates). Compute the union
  as a sorted list of integers with no duplicates.

  Print the union as space-separated integers on one line
  followed by a newline. Exit with status 0.
tags: [collections, set_ops]
execution:
  stdin: "4 1 3 5 2 3\n3 6 1 7 1 4\n"
  stdout_must_contain:
    - "1 2 3 4 5 6 7"
  stdout_must_not_contain: []
  timeout_seconds: 10
