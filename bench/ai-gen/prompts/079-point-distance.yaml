id: "079-point-distance"
title: "Squared distance between two points"
description: |
  Define a record (or struct / data class) `Point` with integer
  fields x and y. Write a function `dist_sq(a, b)` that returns
  the squared Euclidean distance between a and b as an integer:
  (a.x - b.x)^2 + (a.y - b.y)^2.

  In `main`, construct Point(1, 2) and Point(4, 6), compute the
  squared distance, and print exactly "dist_sq=25" on a single
  line. Exit with status 0.
tags: [records, arithmetic]
execution:
  stdin: ""
  stdout_must_contain:
    - "dist_sq=25"
  stdout_must_not_contain: []
  timeout_seconds: 10
