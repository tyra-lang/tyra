id: "078-nested-sum"
title: "Sum of nested lists"
description: |
  Build this nested structure of integers inline (no stdin):

    [[1, 2, 3], [4, 5], [], [6, 7, 8, 9]]

  Use whatever nested-collection representation is idiomatic in
  the language (list of lists, array of arrays, etc.). Compute
  the sum of every integer across all inner lists.

  Print exactly "total=45" on a single line. Exit with status 0.
tags: [collections, nested, fold]
execution:
  stdin: ""
  stdout_must_contain:
    - "total=45"
  stdout_must_not_contain: []
  timeout_seconds: 10
