id: "092-matrix-sum"
title: "Sum of a fixed 2D matrix"
description: |
  Build the 3-by-3 integer matrix inline (no stdin):

    1 2 3
    4 5 6
    7 8 9

  Use whatever nested collection the language prefers. Compute
  the grand total of every cell.

  Print exactly "total=45" on a single line. Exit with status 0.
tags: [nested, collections, arithmetic]
execution:
  stdin: ""
  stdout_must_contain:
    - "total=45"
  stdout_must_not_contain: []
  timeout_seconds: 10
