id: "011-unique-sorted"
title: "Unique, sorted integers"
description: |
  Read whitespace-separated integers from standard input (the
  amount is unknown; read until end-of-file). Remove duplicates
  and sort the remaining integers in ascending order.

  Print the result as a single line of space-separated integers
  (no trailing space) followed by a newline.

  Example: for input "3 1 4 1 5 9 2 6 5 3 5\n" the output must
  contain the substring "1 2 3 4 5 6 9".
tags: [collections, sort, dedupe]
execution:
  stdin: "3 1 4 1 5 9 2 6 5 3 5\n"
  stdout_must_contain:
    - "1 2 3 4 5 6 9"
  stdout_must_not_contain: []
  timeout_seconds: 10
