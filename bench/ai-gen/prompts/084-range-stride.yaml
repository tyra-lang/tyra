id: "084-range-stride"
title: "Strided integer range"
description: |
  Read three integers A, B, S (in that order) from standard
  input, separated by whitespace. A is the inclusive start, B
  is the exclusive end, and S is a strictly positive stride.

  Emit the sequence A, A+S, A+2S, ... while strictly less than
  B. Print the values as space-separated integers on one line
  followed by a newline. If the sequence is empty, print an
  empty line (just a newline).

  Exit with status 0.
tags: [loops, arithmetic, stdin]
execution:
  stdin: "0 20 3\n"
  stdout_must_contain:
    - "0 3 6 9 12 15 18"
  stdout_must_not_contain: []
  timeout_seconds: 10
