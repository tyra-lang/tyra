id: "056-cumulative-sum"
title: "Cumulative sum (prefix sum)"
description: |
  Read a single line of whitespace-separated integers from
  standard input. Produce the cumulative prefix sum: the i-th
  output element equals the sum of the first i+1 input elements.

  Print the result as space-separated integers on one line,
  followed by a newline.

  Example: input "1 2 3 4" -> output "1 3 6 10".

  Exit with status 0.
tags: [collections, fold, prefix_sum]
execution:
  stdin: "1 2 3 4 5\n"
  stdout_must_contain:
    - "1 3 6 10 15"
  stdout_must_not_contain: []
  timeout_seconds: 10
