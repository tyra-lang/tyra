id: "043-starts-with"
title: "Prefix check across many lines"
description: |
  Read the first line of standard input as a prefix string P
  (without its trailing newline). Read all remaining lines until
  end-of-file.

  For each remaining line, print "YES" if the line begins with
  the exact prefix P (case-sensitive), or "NO" otherwise, one
  verdict per line, in input order.

  Exit with status 0.
tags: [strings, stdin, prefix]
execution:
  stdin: "log:\nlog:start\ndebug\nlog:stop\n"
  stdout_must_contain:
    - "YES"
    - "NO"
  stdout_must_not_contain: []
  timeout_seconds: 10
