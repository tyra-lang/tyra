id: "068-double-each"
title: "Double each integer"
description: |
  Read a single line of whitespace-separated integers from
  standard input. Produce a new list by multiplying each element
  by 2. Print the result as space-separated integers on one line
  followed by a newline.

  Exit with status 0.
tags: [collections, map]
execution:
  stdin: "1 2 3 -4 5\n"
  stdout_must_contain:
    - "2 4 6 -8 10"
  stdout_must_not_contain: []
  timeout_seconds: 10
