id: "053-toggle-case"
title: "Toggle ASCII letter case"
description: |
  Read a single line of text from standard input. Produce the
  line with each ASCII letter's case toggled: lowercase letters
  become uppercase and uppercase letters become lowercase. Leave
  other characters unchanged.

  Print the transformed line followed by a newline. Exit with
  status 0.

  Example: "Hello, World!" -> "hELLO, wORLD!"
tags: [strings, mapping]
execution:
  stdin: "Hello, World!\n"
  stdout_must_contain:
    - "hELLO, wORLD!"
  stdout_must_not_contain: []
  timeout_seconds: 10
