id: "018-count-positive"
title: "Count positive numbers (filter + count)"
description: |
  Read whitespace-separated integers from standard input until
  end-of-file. Count how many of them are strictly greater than
  zero.

  Print exactly "positive=N" on a single line followed by a
  newline. Exit with status 0.
tags: [collections, filter, counting]
execution:
  stdin: "1 -2 3 0 -1 4 5 -6 7\n"
  stdout_must_contain:
    - "positive=5"
  stdout_must_not_contain: []
  timeout_seconds: 10
